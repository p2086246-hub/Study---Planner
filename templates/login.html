{% extends "base.html" %}
{% block title %}Login — SmartStudy AI{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">📚</div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Log in to your SmartStudy account</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username or email" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>
{% endblock %}
